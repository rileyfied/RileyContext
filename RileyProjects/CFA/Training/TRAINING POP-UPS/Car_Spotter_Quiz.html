<!doctype html><html lang="en"><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Car Spotter Quiz</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;margin:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;background:#f8f8f8;color:#111}
header{position:sticky;top:0;background:#DD0033;color:#fff;padding:14px 20px;box-shadow:0 1px 4px rgba(0,0,0,.12);z-index:10;display:flex;justify-content:space-between;align-items:center}
h1{margin:0;font-size:18px;letter-spacing:.3px}
.score{font-size:14px;opacity:.9}
main{padding:16px;max-width:480px;margin:0 auto;text-align:center}
.logo-card{background:#fff;border-radius:16px;padding:32px 24px;margin:12px 0 20px;box-shadow:0 2px 8px rgba(0,0,0,.06);min-height:180px;display:flex;align-items:center;justify-content:center}
.logo-card .logo-text{font-size:64px;font-weight:900;letter-spacing:2px;color:#222}
.logo-card .logo-img{max-width:160px;max-height:140px}
.choices{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:0 0 16px}
.choice{border:2px solid #e0e0e0;border-radius:12px;padding:14px 8px;background:#fff;font-size:15px;font-weight:600;cursor:pointer;transition:.15s}
.choice:active{transform:scale(.97)}
.choice.correct{border-color:#00a86b;background:#e6f9f0;color:#00a86b}
.choice.wrong{border-color:#DD0033;background:#ffeef1;color:#DD0033}
.choice.reveal{border-color:#00a86b;background:#e6f9f0;color:#00a86b}
.choice:disabled{opacity:.7;cursor:default}
.feedback{font-size:15px;font-weight:600;margin:8px 0 16px;min-height:24px}
.feedback.correct{color:#00a86b}
.feedback.wrong{color:#DD0033}
.next-btn{display:none;border:0;border-radius:12px;padding:14px 32px;background:#004F71;color:#fff;font-size:16px;font-weight:600;cursor:pointer;margin:8px auto}
.next-btn:active{transform:scale(.98)}
.next-btn.show{display:inline-block}
.progress{display:flex;align-items:center;gap:8px;margin:0 0 8px;font-size:13px;color:#5B6770}
.bar{flex:1;height:6px;background:#e8e8e8;border-radius:3px;overflow:hidden}
.bar-fill{height:100%;background:#DD0033;border-radius:3px;transition:width .3s}
.mode-select{margin:20px 0}
.mode-btn{border:2px solid #DD0033;border-radius:12px;padding:12px 20px;background:#fff;color:#DD0033;font-size:15px;font-weight:600;cursor:pointer;margin:6px}
.mode-btn:active,.mode-btn.active{background:#DD0033;color:#fff}
.end-screen{padding:40px 20px}
.end-screen h2{font-size:28px;margin:0 0 8px}
.end-screen .big-score{font-size:56px;font-weight:900;color:#DD0033;margin:16px 0}
.end-screen .subtitle{font-size:16px;color:#5B6770;margin:0 0 24px}
.restart-btn{border:0;border-radius:12px;padding:14px 32px;background:#DD0033;color:#fff;font-size:16px;font-weight:600;cursor:pointer}
.restart-btn:active{transform:scale(.98)}
.missed-list{text-align:left;margin:20px 0;padding:0;list-style:none}
.missed-list li{padding:8px 12px;border:1px solid #eee;border-radius:8px;margin:6px 0;font-size:14px;display:flex;justify-content:space-between}
.missed-list .you-said{color:#DD0033;font-size:12px}
</style>
<header>
  <h1>Car Spotter Quiz</h1>
  <div class="score" id="scoreDisplay">0 / 0</div>
</header>
<main id="app"></main>

let mode='all', deck=[], idx=0, correct=0, total=0, missed=[];
const app=document.getElementById('app');
const scoreEl=document.getElementById('scoreDisplay');

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function startScreen(){
  app.innerHTML=`
    <div style="padding:30px 0">
      <h2 style="font-size:24px;margin:0 0 4px">Car Spotter Quiz</h2>
      <p style="color:#5B6770;margin:0 0 24px">Train your team to ID cars in the drive-thru</p>
      <div class="mode-select">
        <button class="mode-btn active" data-mode="all">All 44 Cars</button>
        <button class="mode-btn" data-mode="20">Quick 20</button>
        <button class="mode-btn" data-mode="10">Speed 10</button>
        <button class="mode-btn" data-mode="hard">Hard Only</button>
      </div>
      <br>
      <button class="restart-btn" id="startBtn">Start Quiz</button>
    </div>`;
  const btns=app.querySelectorAll('.mode-btn');
  btns.forEach(b=>b.addEventListener('click',()=>{
    btns.forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    mode=b.dataset.mode;
  }));
  document.getElementById('startBtn').addEventListener('click',startQuiz);
}

const HARD_CARS=["Acura","Buick","Genesis","Infiniti","Lincoln","Mazda","Mercury","Pontiac","Saturn","Scion","Smart","Rivian","Wagoneer","Cadillac"];

function startQuiz(){
  correct=0; total=0; missed=[];
  let pool=[...CARS];
  if(mode==='hard') pool=pool.filter(c=>HARD_CARS.includes(c.name));
  shuffle(pool);
  if(mode==='20') pool=pool.slice(0,20);
  if(mode==='10') pool=pool.slice(0,10);
  deck=pool; idx=0;
  updateScore();
  showQuestion();
}

function updateScore(){
  scoreEl.textContent=`${correct} / ${total}`;
}

function showQuestion(){
  if(idx>=deck.length){showEnd();return;}
  const car=deck[idx];
  const wrongs=shuffle(CARS.filter(c=>c.name!==car.name)).slice(0,3);
  const choices=shuffle([car,...wrongs]);
  const pct=Math.round((idx/deck.length)*100);
  app.innerHTML=`
    <div class="progress">
      <span>${idx+1} of ${deck.length}</span>
      <div class="bar"><div class="bar-fill" style="width:${pct}%"></div></div>
    </div>
    <div class="logo-card" id="logoCard">${LOGOS[car.name]||`<span class="logo-text">${car.name[0]}</span>`}</div>
    <div class="feedback" id="feedback"></div>
    <div class="choices" id="choices">
      ${choices.map(c=>`<button class="choice" data-name="${c.name}">${c.name}</button>`).join('')}
    </div>
    <button class="next-btn" id="nextBtn">Next →</button>`;
  const btns=app.querySelectorAll('.choice');
  btns.forEach(b=>b.addEventListener('click',()=>handleAnswer(b,car.name,btns)));
  document.getElementById('nextBtn').addEventListener('click',()=>{idx++;showQuestion();});
}

function handleAnswer(btn,answer,allBtns){
  allBtns.forEach(b=>{b.disabled=true;if(b.dataset.name===answer)b.classList.add('reveal');});
  const fb=document.getElementById('feedback');
  total++;
  if(btn.dataset.name===answer){
    btn.classList.add('correct');
    fb.textContent='Correct!';
    fb.className='feedback correct';
    correct++;
  } else {
    btn.classList.add('wrong');
    fb.textContent=`Nope — it's ${answer}`;
    fb.className='feedback wrong';
    missed.push({answer,guessed:btn.dataset.name});
  }
  updateScore();
  document.getElementById('nextBtn').classList.add('show');
}

function showEnd(){
  const pct=deck.length?Math.round((correct/deck.length)*100):0;
  let grade='Keep practicing!';
  if(pct>=90) grade='Car Spotter Pro!';
  else if(pct>=75) grade='Great job!';
  else if(pct>=60) grade='Getting there!';
  let missedHtml='';
  if(missed.length){
    missedHtml=`<h3 style="margin:20px 0 8px;font-size:16px">Review These:</h3><ul class="missed-list">${missed.map(m=>`<li><strong>${m.answer}</strong><span class="you-said">you said: ${m.guessed}</span></li>`).join('')}</ul>`;
  }
  app.innerHTML=`
    <div class="end-screen">
      <h2>${grade}</h2>
      <div class="big-score">${pct}%</div>
      <div class="subtitle">${correct} out of ${deck.length} correct</div>
      ${missedHtml}
      <button class="restart-btn" id="restartBtn">Play Again</button>
    </div>`;
  document.getElementById('restartBtn').addEventListener('click',startScreen);
}

startScreen();
</script></html>
