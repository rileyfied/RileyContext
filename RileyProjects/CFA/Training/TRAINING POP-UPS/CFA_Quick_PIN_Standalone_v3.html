*{box-sizing:border-box}html,body{height:100%}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;background:#FFFFFF;color:#111}
header{position:sticky;top:0;background:#DD0033;color:#fff;padding:16px 20px;box-shadow:0 1px 4px rgba(0,0,0,.1);z-index:10}
h1{margin:0;font-size:20px;letter-spacing:.3px}
main{padding:16px;max-width:720px;margin:0 auto}
#search{width:100%;padding:14px 16px;border:2px solid #EEEDEB;border-radius:12px;font-size:18px;outline:none;transition:.15s;border-color:#EEEDEB}
#search:focus{border-color:#DD0033;box-shadow:0 0 0 3px rgba(221,0,51,.15)}
#status{margin:10px 2px;font-size:13px;color:#5B6770}
#results{list-style:none;margin:8px 0 80px 0;padding:0}

.name{font-weight:600}
.sub{font-size:12px;color:#5B6770;margin-top:4px}
.pin{font-variant-numeric:tabular-nums;font-weight:700}
.copyBtn{border:0;border-radius:10px;padding:8px 10px;background:#004F71;color:#fff;font-size:13px}
.copyBtn:active{transform:scale(.98)}
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#004F71;color:#fff;padding:10px 14px;border-radius:12px;opacity:0;pointer-events:none;transition:.2s}
#toast.show{opacity:1}
.visually-hidden{position:absolute!important;height:1px;width:1px;overflow:hidden;clip:rect(1px,1px,1px,1px);white-space:nowrap}
</style>

const key = s => (s||"").normalize('NFKD').replace(/[\u0300-\u036f]/g,'').replace(/[^A-Za-z0-9']/g,'').toLowerCase();
const input = document.getElementById('search');
const list = document.getElementById('results');
const status = document.getElementById('status');
const toast = document.getElementById('toast');

function render(items){
  list.innerHTML='';
  if(!items.length){ status.textContent=''; return; }
  status.textContent = `${items.length} match${items.length===1?'':'es'}`;
  for(const r of items){
    const li=document.createElement('li'); li.className='result';
    const left=document.createElement('div');
    const nm=document.createElement('div'); nm.className='name'; nm.textContent=`${r.first} ${r.last}`;
    const sub=document.createElement('div'); sub.className='sub'; sub.textContent=r.group;
    left.append(nm,sub);
    const right=document.createElement('div'); right.style.display='flex'; right.style.alignItems='center'; right.style.gap='12px';
    const pin=document.createElement('div'); pin.className='pin'; pin.textContent=r.signInPin;
    const btn=document.createElement('button'); btn.className='copyBtn'; btn.textContent='Copy';
    btn.addEventListener('click', async ()=>{ try{ await navigator.clipboard.writeText(r.signInPin); showToast('PIN copied'); }catch(e){ showToast('Copy failed'); } });
    right.append(pin,btn);
    li.append(left,right);
    list.append(li);
  }
}

function showToast(msg){
  toast.textContent=msg; toast.classList.add('show'); setTimeout(()=>toast.classList.remove('show'), 1200);
}

const DATA = EMPLOYEES.map(r=>{ return {...r, firstKey:key(r.first)}; }).sort((a,b)=>{
  const fa=a.first.toLowerCase(), fb=b.first.toLowerCase();
  if(fa<fb) return -1; if(fa>fb) return 1; return a.last.toLowerCase().localeCompare(b.last.toLowerCase());
});

function search(q){
  const k=key(q);
  if(!k){ list.innerHTML=''; status.textContent=''; return; }
  render(DATA.filter(r=>r.firstKey.startsWith(k)));
}

input.addEventListener('input', e=>search(e.target.value));
