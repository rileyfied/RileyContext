<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Car Spotter</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0d0d0d;
  --card:#1a1a1a;
  --border:#2a2a2a;
  --accent:#e8142a;
  --correct:#2ecc71;
  --wrong:#e74c3c;
  --text:#f0f0f0;
  --muted:#888;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;overscroll-behavior:none}

/* SPLASH */
#splash{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:100vh;gap:24px;padding:32px;text-align:center;
}
#splash h1{font-size:2rem;font-weight:800;letter-spacing:-0.5px}
#splash h1 span{color:var(--accent)}
#splash p{color:var(--muted);font-size:0.95rem;max-width:320px;line-height:1.5}
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:10px;
  background:var(--accent);color:#fff;border:none;border-radius:14px;
  padding:16px 32px;font-size:1.05rem;font-weight:700;cursor:pointer;
  width:100%;max-width:320px;transition:opacity 0.15s;
}
.btn:active{opacity:0.75}
.btn.secondary{background:var(--card);border:1px solid var(--border);color:var(--text)}
#fileInput{display:none}
#fileCount{color:var(--muted);font-size:0.85rem;min-height:20px}

/* GAME */
#game{display:none;flex-direction:column;height:100vh;padding:env(safe-area-inset-top,0) 0 env(safe-area-inset-bottom,0)}

/* Header */
.game-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 20px;border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.progress{font-size:0.85rem;color:var(--muted)}
.score{font-size:0.85rem;font-weight:700}
.score .s-correct{color:var(--correct)}
.score .s-wrong{color:var(--wrong)}

/* Progress bar */
.progress-bar{height:3px;background:var(--border);flex-shrink:0}
.progress-bar-fill{height:100%;background:var(--accent);transition:width 0.3s ease}

/* Card area */
.card-area{
  flex:1;display:flex;align-items:center;justify-content:center;
  padding:24px 20px;overflow:hidden;
}
.logo-card{
  background:#fff;border-radius:20px;padding:32px;
  display:flex;align-items:center;justify-content:center;
  width:100%;max-width:380px;aspect-ratio:4/3;
  box-shadow:0 8px 40px rgba(0,0,0,0.4);
  transition:transform 0.15s;
}
.logo-card img{max-width:100%;max-height:100%;object-fit:contain}

/* Feedback overlay */
.feedback{
  position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
  font-size:5rem;pointer-events:none;opacity:0;transition:opacity 0.2s;z-index:10;
}
.feedback.show{opacity:1}

/* Input area */
.input-area{
  padding:16px 20px 24px;display:flex;flex-direction:column;gap:12px;flex-shrink:0;
}
.answer-input{
  background:var(--card);border:2px solid var(--border);border-radius:14px;
  padding:16px 20px;font-size:1.1rem;color:var(--text);width:100%;outline:none;
  transition:border-color 0.2s;
}
.answer-input:focus{border-color:var(--accent)}
.answer-input.correct{border-color:var(--correct);background:rgba(46,204,113,0.08)}
.answer-input.wrong{border-color:var(--wrong);background:rgba(231,76,60,0.08)}
.submit-btn{
  background:var(--accent);color:#fff;border:none;border-radius:14px;
  padding:16px;font-size:1.05rem;font-weight:700;cursor:pointer;
  transition:opacity 0.15s;
}
.submit-btn:active{opacity:0.75}
.hint{text-align:center;font-size:0.9rem;color:var(--muted);min-height:22px}
.hint.correct-answer{color:var(--wrong);font-weight:600}

/* SKIP button */
.skip-row{display:flex;justify-content:center}
.skip-btn{
  background:none;border:1px solid var(--border);border-radius:10px;
  color:var(--muted);padding:8px 20px;font-size:0.85rem;cursor:pointer;
}

/* END SCREEN */
#endScreen{
  display:none;flex-direction:column;align-items:center;justify-content:center;
  height:100vh;gap:20px;padding:32px;text-align:center;
}
#endScreen h2{font-size:2rem;font-weight:800}
.final-score{font-size:4rem;font-weight:900;color:var(--accent)}
.final-label{color:var(--muted);font-size:0.95rem}
.end-buttons{display:flex;flex-direction:column;gap:12px;width:100%;max-width:320px}
</style>
</head>
<body>

<!-- SPLASH -->
<div id="splash">
  <div>
    <h1>Car <span>Spotter</span></h1>
  </div>
  <p>Load your car logos folder, then test how fast you can name every brand.</p>
  <button class="btn" onclick="document.getElementById('fileInput').click()">
    Load Car Logos Folder
  </button>
  <input type="file" id="fileInput" webkitdirectory multiple accept="image/*" onchange="loadImages(this)">
  <div id="fileCount"></div>
  <button class="btn secondary" id="startBtn" onclick="startGame()" style="display:none">
    Start Game →
  </button>
</div>

<!-- GAME -->
<div id="game">
  <div class="game-header">
    <span class="progress" id="progressLabel">1 / 1</span>
    <span class="score"><span class="s-correct" id="correctCount">0</span> correct &nbsp; <span class="s-wrong" id="wrongCount">0</span> wrong</span>
  </div>
  <div class="progress-bar">
    <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
  </div>
  <div class="card-area">
    <div class="logo-card">
      <img id="logoImg" src="" alt="car logo">
    </div>
  </div>
  <div class="input-area">
    <input
      type="text"
      class="answer-input"
      id="answerInput"
      placeholder="Type the car brand..."
      autocomplete="off"
      autocorrect="off"
      autocapitalize="off"
      spellcheck="false"
      onkeydown="handleKey(event)"
    >
    <button class="submit-btn" onclick="submitAnswer()">Submit</button>
    <div class="hint" id="hint"></div>
    <div class="skip-row">
      <button class="skip-btn" onclick="skipCard()">Skip</button>
    </div>
  </div>
</div>

<div class="feedback" id="feedback"></div>

<!-- END SCREEN -->
<div id="endScreen">
  <h2>Round Complete</h2>
  <div class="final-score" id="finalScore">0</div>
  <div class="final-label" id="finalLabel"></div>
  <div class="end-buttons">
    <button class="btn" onclick="restartGame()">Play Again</button>
    <button class="btn secondary" onclick="showSplash()">Load New Folder</button>
  </div>
</div>

<script>
const ALIASES = {
  'infiniti':['infinity','infinti','infniti'],
  'chevrolet':['chevy'],
  'volkswagen':['vw'],
  'mercedes-benz':['mercedes','benz','merc'],
  'mercedes':['mercedes-benz','benz','merc'],
  'bmw':['beemer','beamer'],
  'land rover':['landrover'],
  'alfa romeo':['alfa'],
  'aston martin':['aston'],
  'rolls-royce':['rolls royce','rolls'],
  'genesis':['genisis'],
  'maserati':['masarati'],
  'lamborghini':['lambo','lamborgini'],
  'porsche':['porche'],
};

let deck = [];
let currentIndex = 0;
let correct = 0;
let wrong = 0;
let answered = false;

function loadImages(input) {
  const files = Array.from(input.files).filter(f => f.type.startsWith('image/'));
  if (!files.length) return;

  deck = files.map(f => {
    const name = f.name.replace(/\.[^.]+$/, '').trim();
    return { url: URL.createObjectURL(f), answer: name };
  });

  document.getElementById('fileCount').textContent = `${deck.length} logos loaded`;
  document.getElementById('startBtn').style.display = '';
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

function startGame() {
  shuffle(deck);
  currentIndex = 0;
  correct = 0;
  wrong = 0;
  answered = false;

  document.getElementById('splash').style.display = 'none';
  document.getElementById('endScreen').style.display = 'none';
  document.getElementById('game').style.display = 'flex';

  updateScoreDisplay();
  showCard();
}

function showCard() {
  answered = false;
  const card = deck[currentIndex];
  document.getElementById('logoImg').src = card.url;

  const input = document.getElementById('answerInput');
  input.value = '';
  input.className = 'answer-input';
  input.disabled = false;
  input.focus();

  document.getElementById('hint').textContent = '';
  document.getElementById('hint').className = 'hint';

  updateProgress();
}

function updateProgress() {
  const total = deck.length;
  const current = currentIndex + 1;
  document.getElementById('progressLabel').textContent = `${current} / ${total}`;
  document.getElementById('progressFill').style.width = `${((currentIndex) / total) * 100}%`;
}

function updateScoreDisplay() {
  document.getElementById('correctCount').textContent = correct;
  document.getElementById('wrongCount').textContent = wrong;
}

function isMatch(userAnswer, expected) {
  const u = userAnswer.toLowerCase().trim();
  const e = expected.toLowerCase().trim();
  if (u === e) return true;
  const aliases = ALIASES[e] || [];
  if (aliases.includes(u)) return true;
  for (const [key, vals] of Object.entries(ALIASES)) {
    if (vals.includes(e) && (u === key || vals.includes(u))) return true;
  }
  return false;
}

function submitAnswer() {
  if (answered) { nextCard(); return; }

  const input = document.getElementById('answerInput');
  const userAnswer = input.value.trim();
  if (!userAnswer) return;

  answered = true;
  input.disabled = true;

  const expected = deck[currentIndex].answer;
  const hit = isMatch(userAnswer, expected);

  if (hit) {
    correct++;
    input.classList.add('correct');
    showFeedback('✓', 'correct');
    document.getElementById('hint').textContent = '✓ Correct!';
    document.getElementById('hint').className = 'hint';
    document.getElementById('hint').style.color = 'var(--correct)';
  } else {
    wrong++;
    input.classList.add('wrong');
    showFeedback('✗', 'wrong');
    document.getElementById('hint').textContent = `Answer: ${expected}`;
    document.getElementById('hint').className = 'hint correct-answer';
  }

  updateScoreDisplay();
  setTimeout(nextCard, 1600);
}

function skipCard() {
  if (answered) return;
  wrong++;
  const expected = deck[currentIndex].answer;
  document.getElementById('hint').textContent = `Answer: ${expected}`;
  document.getElementById('hint').className = 'hint correct-answer';
  document.getElementById('answerInput').disabled = true;
  answered = true;
  updateScoreDisplay();
  setTimeout(nextCard, 1600);
}

function nextCard() {
  currentIndex++;
  if (currentIndex >= deck.length) {
    endGame();
  } else {
    showCard();
  }
}

function showFeedback(symbol, type) {
  const el = document.getElementById('feedback');
  el.textContent = symbol;
  el.style.color = type === 'correct' ? 'var(--correct)' : 'var(--wrong)';
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 500);
}

function handleKey(e) {
  if (e.key === 'Enter') submitAnswer();
}

function endGame() {
  document.getElementById('game').style.display = 'none';
  document.getElementById('endScreen').style.display = 'flex';

  const total = deck.length;
  const pct = Math.round((correct / total) * 100);
  document.getElementById('finalScore').textContent = `${correct}/${total}`;
  document.getElementById('finalLabel').textContent = `${pct}% — ${getRating(pct)}`;
}

function getRating(pct) {
  if (pct === 100) return 'Perfect! 🏆';
  if (pct >= 90) return 'Car Spotter Elite';
  if (pct >= 75) return 'Sharp Eyes';
  if (pct >= 60) return 'Getting There';
  return 'Keep Practicing';
}

function restartGame() {
  startGame();
}

function showSplash() {
  document.getElementById('endScreen').style.display = 'none';
  document.getElementById('splash').style.display = 'flex';
  document.getElementById('fileCount').textContent = '';
  document.getElementById('startBtn').style.display = 'none';
  document.getElementById('fileInput').value = '';
  deck = [];
}
</script>
</body>
</html>
